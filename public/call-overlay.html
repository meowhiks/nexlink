<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexLink — Звонок</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg-primary: #0a0a0c;
      --bg-secondary: #141419;
      --border-medium: #2a2a32;
      --text-primary: #e8e8ed;
      --accent-primary: #6366f1;
      --red: #ef4444;
    }
    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
      -webkit-app-region: drag;
      user-select: none;
    }
    #video-frame {
      width: 100%;
      height: 100vh;
      object-fit: contain;
      background: #000;
      display: block;
    }
    #controls-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: linear-gradient(transparent, rgba(0,0,0,0.9));
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 8px;
      -webkit-app-region: no-drag;
    }
    .ctl-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.15);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .ctl-btn:hover {
      background: rgba(255,255,255,0.25);
      transform: scale(1.05);
    }
    .ctl-btn.fullscreen {
      background: var(--accent-primary);
    }
    .ctl-btn.close {
      background: var(--red);
    }
    #title-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 32px;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      padding: 0 12px;
      font-size: 13px;
      -webkit-app-region: drag;
    }
    #title-bar span { opacity: 0.9; }
  </style>
</head>
<body>
  <div id="title-bar"><span>NexLink — Звонок</span></div>
  <img id="video-frame" alt="Видео звонка" />
  <div id="controls-bar">
    <button class="ctl-btn fullscreen" id="fs-btn" title="Полный экран">
      <i class="fas fa-expand"></i>
    </button>
    <button class="ctl-btn close" id="close-btn" title="Вернуть в окно">
      <i class="fas fa-compress"></i>
    </button>
  </div>
  <script>
    const videoFrame = document.getElementById('video-frame');
    const fsBtn = document.getElementById('fs-btn');
    const closeBtn = document.getElementById('close-btn');

    if (window.electronAPI?.callOverlay) {
      window.electronAPI.callOverlay.onFrame((dataUrl) => {
        if (videoFrame && dataUrl) videoFrame.src = dataUrl;
      });
      fsBtn?.addEventListener('click', () => window.electronAPI.callOverlay.toggleFullscreen());
      closeBtn?.addEventListener('click', () => window.electronAPI.callOverlay.close());
    }
  </script>
</body>
</html>
